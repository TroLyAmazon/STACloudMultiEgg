name: build c
on:
  workflow_dispatch:
jobs:
  push:
    name: "deverlopment:dotnet_${{ matrix.tag }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: 8
            platforms: linux/amd64,linux/arm64
          - tag: 7
            platforms: linux/amd64,linux/arm64
          - tag: 6
            platforms: linux/amd64,linux/arm64
          - tag: 5
            platforms: linux/amd64,linux/arm64
          - tag: '3.1'
            platforms: linux/amd64,linux/arm64
          - tag: '2.1'
            platforms: linux/amd64
    steps:
      - uses: actions/checkout@v4
      - name: Set registry prefix (lowercase)
        id: registry
        run: echo "owner_lower=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - uses: docker/setup-qemu-action@v3
        with:
            image: tonistiigi/binfmt:qemu-v7.0.0-28
      - uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ steps.registry.outputs.owner_lower }}
          password: ${{ secrets.USER_TOKEN != '' && secrets.USER_TOKEN || secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./c
          file: ./c/${{ matrix.tag }}/Dockerfile
          platforms: ${{ matrix.platforms }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ steps.registry.outputs.owner_lower }}/deverlopment:dotnet_${{ matrix.tag }}
